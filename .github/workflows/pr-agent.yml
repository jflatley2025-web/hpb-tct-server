name: PR Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}