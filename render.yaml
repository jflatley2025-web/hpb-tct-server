# ===============================================================
# render.yaml — HPB–TCT v19.2 AutoLearn + Telegram Integration
# ===============================================================
# • Web API: HPB–TCT TensorTrade AutoLearn environment
# • Worker: Telegram Bot Bridge (continuous polling)
# ===============================================================

services:
  # ───────────────────────────────────────────────
  # Main Web Service (HPB–TCT Server)
  # ───────────────────────────────────────────────
  - type: web
    name: hpb-tct-server
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server_mexc:app --host 0.0.0.0 --port $PORT

    # ✅ Only healthCheckPath is now supported in Render 2026 YAML spec
    healthCheckPath: /status

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: LOG_LEVEL
        value: info
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: API_URL
        value: https://hpb-tct-server.onrender.com
      - key: AUTO_TRAIN_DEFAULT_EPISODES
        value: 5
      - key: PHEMEX_API_KEY
        sync: false
      - key: PHEMEX_API_SECRET
        sync: false

    autoDeploy: true

  # ───────────────────────────────────────────────
  # Telegram Bot Worker (runs 24/7 polling)
  # ───────────────────────────────────────────────
  - type: worker
    name: hpb-tct-telegram
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py

    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: API_BASE
        value: https://hpb-tct-server.onrender.com
