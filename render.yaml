# ===============================================================
# render.yaml — HPB–TCT v19.2 AutoLearn + Telegram Integration
# ===============================================================
# • Adds bot credentials and API endpoint URL
# • Health checks + extended timeouts
# ===============================================================

services:
  - type: web
    name: hpb-tct-server
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /status
    healthCheckInterval: 30
    healthCheckTimeout: 20
    healthCheckGracePeriod: 120

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: LOG_LEVEL
        value: info
      - key: BOT_TOKEN
        sync: false
      - key: API_URL
        value: https://hpb-tct-server.onrender.com
      - key: AUTO_TRAIN_DEFAULT_EPISODES
        value: 5

    autoDeploy: true
